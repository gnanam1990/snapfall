name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  contracts:
    name: Contracts and duplicate-advance protection
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: foundry-rs/foundry-toolchain@v1
      - name: Run complete contract suite
        run: forge test --root contracts -vvv
      # Work-split acceptance criterion AT-17.
      - name: Second advance on the same job reverts
        run: forge test --root contracts --match-test secondAdvanceOnPriorJobReverts -vvv

  daemon:
    name: Daemon integration and worker isolation
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: daemon
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.x'
          cache-dependency-path: daemon/go.sum
      - name: Run daemon integration suite
        run: go test -race ./...
      # Work-split acceptance criterion AT-16.
      - name: Worker has no path to funding
        run: go test ./internal/brain -run '^TestAT16_' -count=1

  sidecar:
    name: Sidecar integration and Circle facilitator
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sidecar
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: sidecar/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run service:test
      - run: npm run store:test
      # Work-split acceptance criterion AT-18.
      - name: Validate the Circle facilitator fixture contract
        run: npm run test:circle-facilitator-fixture
      - name: Verify the real Circle V1 fixture when supplied
        if: ${{ hashFiles('sidecar/fixtures/v1-circle-payment.json') != '' }}
        run: npm run verify:circle-facilitator-fixture -- fixtures/v1-circle-payment.json
